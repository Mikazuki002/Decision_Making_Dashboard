{% extends 'dtr/base.html' %}
{% block title %}{{ mode }} Employee · Office DTR{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7">
        <div class="card shadow-sm">
            <div class="card-body">
                <h3 class="card-title mb-3">{{ mode }} Employee</h3>
                <form method="post">
                    {% csrf_token %}
                    {% for f in form %}
                        <div class="mb-3">
                            <label class="form-label">{{ f.label }}</label>
                            {{ f }}
                            {% if f.errors %}<div class="text-danger small">{{ f.errors }}</div>{% endif %}
                        </div>
                    {% endfor %}
                    <button class="btn btn-primary" type="submit">Save</button>
                    <a href="{% url 'dtr:employee_list' %}" class="btn btn-outline-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
