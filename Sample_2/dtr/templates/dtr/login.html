{% extends 'dtr/base.html' %}
{% block title %}Login · Office DTR{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-sm">
            <div class="card-body">
                <h3 class="card-title mb-3">Sign in</h3>
                <form method="post">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button class="btn btn-primary w-100" type="submit">Sign in</button>
                </form>
                <p class="text-muted small mt-3 mb-0">
                    Use the admin account you created with <code>createsuperuser</code>.
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
